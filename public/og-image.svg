<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0d0b"/>

  <!-- Noise texture simulation -->
  <defs>
    <pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grain)" opacity="0.3"/>

  <!-- Road lines -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#f5e6d3" stroke-width="4" stroke-dasharray="40 20"/>

  <!-- Main text -->
  <text x="600" y="220" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="#f5e6d3">
    LANCE OU DEGAGE
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="28" fill="#a89f91">
    tu sors un truc en 30 jours.
  </text>
  <text x="600" y="370" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="28" fill="#a89f91">
    ou tu degages.
  </text>

  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="24" fill="#666">
    lance-ou-degage.fr
  </text>

  <!-- Decorative elements - simple car/road theme -->
  <rect x="100" y="480" width="60" height="30" rx="5" fill="#e63946"/>
  <rect x="1040" y="480" width="60" height="30" rx="5" fill="#2a9d8f"/>
</svg>
